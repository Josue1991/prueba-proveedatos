<!DOCTYPE html>
<html lang="es" ng-app="contactoApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Contactos</title>

    <!-- Bootstrap 4 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 2rem; }
        .action-buttons .btn { margin-right: 4px; }
        th[ng-click] { cursor: pointer; user-select: none; white-space: nowrap; }
        th[ng-click]:hover { background-color: #0056b3 !important; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="#!/">
                <i class="bi bi-person-lines-fill"></i> Contactos
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ml-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#!/"><i class="bi bi-people"></i> Contactos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#!/reportes"><i class="bi bi-file-earmark-bar-graph"></i> Reportes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="http://localhost:8080/swagger/" target="_blank">
                            <i class="bi bi-code-slash"></i> Swagger
                        </a>
                    </li>
                    <li class="nav-item ml-2">
                        <a class="btn btn-light btn-sm" href="#!/nuevo">
                            <i class="bi bi-plus-circle"></i> Nuevo
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div ng-view></div>
    </div>

    <!-- AngularJS 1.x + ngRoute -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>

    <!-- App scripts -->
    <script src="app.js"></script>
    <script src="services/contacto.service.js"></script>
    <script src="controllers/contacto.controller.js"></script>

    <!-- Bootstrap 4 JS -->
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
