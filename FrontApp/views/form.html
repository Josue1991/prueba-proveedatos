<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0"><i class="bi bi-person-fill"></i> {{ vm.title }}</h5>
            </div>
            <div class="card-body">

                <div ng-if="vm.error" class="alert alert-danger">{{ vm.error }}</div>

                <form name="contactoForm" ng-submit="vm.submit()" novalidate>

                    <!-- Nombre -->
                    <div class="form-group">
                        <label class="font-weight-bold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" class="form-control"
                               ng-model="vm.form.nombre"
                               required maxlength="100"
                               ng-class="{'is-invalid': contactoForm.nombre.$touched && contactoForm.nombre.$invalid}"
                               name="nombre"
                               placeholder="Ej: Juan Pérez">
                        <div class="invalid-feedback">El nombre es requerido.</div>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label class="font-weight-bold">Email <span class="text-danger">*</span></label>
                        <input type="email" class="form-control"
                               ng-model="vm.form.email"
                               required maxlength="100"
                               ng-class="{'is-invalid': contactoForm.email.$touched && contactoForm.email.$invalid}"
                               name="email"
                               placeholder="Ej: usuario@dominio.com">
                        <div class="invalid-feedback">Ingresa un email válido (ej: usuario@dominio.com).</div>
                    </div>

                    <!-- Teléfono -->
                    <div class="form-group">
                        <label class="font-weight-bold">Teléfono <span class="text-danger">*</span></label>
                        <input type="tel" class="form-control"
                               ng-model="vm.form.telefono"
                               required maxlength="20" minlength="7"
                               ng-pattern="/^[0-9+\-\s()]{7,20}$/"
                               ng-class="{'is-invalid': contactoForm.telefono.$touched && contactoForm.telefono.$invalid}"
                               name="telefono"
                               placeholder="Ej: +593987654321">
                        <div class="invalid-feedback">
                            Solo números, +, -, espacios y paréntesis (7-20 caracteres).
                        </div>
                    </div>

                    <!-- Región -->
                    <div class="form-group">
                        <label class="font-weight-bold">Región <span class="text-danger">*</span></label>
                        <select class="form-control"
                                ng-model="vm.selectedRegionId"
                                ng-options="r.id as r.nombre_region for r in vm.regiones"
                                ng-change="vm.onRegionChange()"
                                required
                                name="region"
                                ng-class="{'is-invalid': contactoForm.region.$touched && contactoForm.region.$invalid}">
                            <option value="">— Seleccione una región —</option>
                        </select>
                        <div class="invalid-feedback">La región es requerida.</div>
                    </div>

                    <!-- Provincia -->
                    <div class="form-group">
                        <label class="font-weight-bold">Provincia <span class="text-danger">*</span></label>
                        <select class="form-control"
                                ng-model="vm.form.id_provincia"
                                ng-options="p.id as p.nombre_provincia for p in vm.provincias"
                                required
                                name="provincia"
                                ng-disabled="!vm.selectedRegionId"
                                ng-class="{'is-invalid': contactoForm.provincia.$touched && contactoForm.provincia.$invalid}">
                            <option value="">— Seleccione una provincia —</option>
                        </select>
                        <div class="invalid-feedback">La provincia es requerida.</div>
                    </div>

                    <div class="d-flex">
                        <button type="submit" class="btn btn-primary mr-2"
                                ng-disabled="contactoForm.$invalid || vm.saving">
                            <span ng-if="vm.saving">
                                <span class="spinner-border spinner-border-sm"></span> Guardando…
                            </span>
                            <span ng-if="!vm.saving">
                                <i class="bi bi-floppy"></i> Guardar
                            </span>
                        </button>
                        <button type="button" class="btn btn-secondary"
                                ng-click="vm.cancelar()">
                            <i class="bi bi-x-circle"></i> Cancelar
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
