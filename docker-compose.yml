services:

  # ── MySQL ──────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: proovedatos_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: proovedatos
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/seeds/02_seed_region.sql:/docker-entrypoint-initdb.d/02_seed_region.sql:ro
      - ./db/seeds/03_seed_provincia.sql:/docker-entrypoint-initdb.d/03_seed_provincia.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PHP API ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./Api
      dockerfile: Dockerfile
    container_name: proovedatos_api
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: proovedatos
      DB_USER: root
      DB_PASS: secret
    depends_on:
      mysql:
        condition: service_healthy

  # ── AngularJS Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./FrontApp
      dockerfile: Dockerfile
    container_name: proovedatos_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - api

volumes:
  mysql_data:
